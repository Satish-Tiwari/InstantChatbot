spring:
  application:
    name: instant-chatbot-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:instantchatbot}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # --- Spring AI Configuration ---
  ai:
    provider: ${AI_PROVIDER:openai}
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.7
          max-tokens: 500
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-small}

    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-3-5-sonnet-20240620}
          temperature: 0.7
          max-tokens: 500

    vertex:
      ai:
        gemini:
          project-id: ${GOOGLE_PROJECT_ID:}
          location: ${GOOGLE_LOCATION:us-central1}
          chat:
            options:
              model: ${GOOGLE_MODEL:gemini-1.5-flash}
              temperature: 0.7
              max-tokens: 500

    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

server:
  port: ${SERVER_PORT:8080}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:myUltraSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024!}
  expiration: ${JWT_EXPIRATION:86400000}

# File Storage
storage:
  zip-path: ${ZIP_STORAGE_PATH:./generated-bots}

# Crawler Configuration
crawler:
  max-pages: ${MAX_CRAWL_PAGES:50}
  max-depth: ${MAX_CRAWL_DEPTH:3}
  timeout-seconds: ${CRAWL_TIMEOUT:30}
  user-agent: InstantChatbotBot/1.0 (AI Chatbot Generator)

# RAG Configuration
rag:
  top-k: ${RAG_TOP_K:5}
  similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.7}
  chunk-size: ${CHUNK_SIZE:500}
  chunk-overlap: ${CHUNK_OVERLAP:50}

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  level:
    com.instantchatbot: DEBUG
    org.springframework.ai: INFO
